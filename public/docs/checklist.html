<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Documentación — Güemes 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--g6:#1b4332;--g5:#2d6a4f;--g4:#40916c;--g0:#f0f7f2;--go4:#c9a227;--go3:#d4a853;--go1:#fdf8ed;--bl:#3b82f6;--rd:#dc2626;--x9:#111827;--x7:#374151;--x6:#4b5563;--x5:#6b7280;--x4:#9ca3af;--x2:#e5e7eb;--x1:#f3f4f6;--x0:#f9fafb;--w:#fff;--r:12px;--sh:0 1px 3px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--x0);color:var(--x7);line-height:1.6;-webkit-font-smoothing:antialiased}
.nav{position:sticky;top:0;z-index:100;background:var(--w);border-bottom:1px solid var(--x2);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:48px}.nav a{text-decoration:none;color:var(--g6);font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:.4rem}.nav a svg{width:16px;height:16px}.nav .title{font-size:.82rem;color:var(--x5)}.nav .actions{display:flex;gap:.5rem}.nav .actions button{background:var(--x1);border:1px solid var(--x2);border-radius:6px;padding:.3rem .7rem;font-size:.75rem;font-weight:600;color:var(--x6);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:.3rem}.nav .actions button:hover{background:var(--x2)}
.deadline{background:#fef2f2;border-bottom:1px solid #fecaca;padding:.5rem 2rem;text-align:center;font-size:.82rem;color:var(--rd);font-weight:600}
.main{max-width:700px;margin:0 auto;padding:1.5rem}
.progress-card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:1.25rem;margin-bottom:1.25rem;border:1px solid var(--x1);text-align:center}
.progress-text{font-size:.85rem;color:var(--x6);margin-bottom:.5rem}
.progress-text strong{color:var(--g6);font-size:1.1rem}
.progress-bar{background:var(--x1);border-radius:6px;height:10px;overflow:hidden;margin-top:.35rem}
.progress-fill{background:linear-gradient(90deg,var(--g5),var(--g4));height:100%;border-radius:6px;transition:width .3s}
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:1.5rem;margin-bottom:1rem;border:1px solid var(--x1)}
.card h2{font-size:.88rem;font-weight:700;color:var(--g6);margin-bottom:.75rem;padding-bottom:.35rem;border-bottom:2px solid var(--go3);text-transform:uppercase;letter-spacing:.04em}
.check-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem 0;border-bottom:1px solid var(--x1)}
.check-item:last-child{border-bottom:none}
.check-item input{width:18px;height:18px;margin-top:2px;accent-color:var(--g5);cursor:pointer;flex-shrink:0}
.check-item label{cursor:pointer;font-size:.84rem;color:var(--x6);line-height:1.4}
.check-item label strong{color:var(--x9)}
.check-item .detail{display:block;font-size:.74rem;color:var(--x4);margin-top:.1rem}
.tag{display:inline-block;font-size:.62rem;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:.3rem;vertical-align:middle}
.tag-req{background:#fef2f2;color:var(--rd)}.tag-rec{background:var(--go1);color:#92400e}
.footer{text-align:center;padding:1.5rem;color:var(--x4);font-size:.72rem;border-top:1px solid var(--x2)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--x9);color:var(--w);padding:.6rem 1.25rem;border-radius:50px;font-size:.82rem;opacity:0;transition:all .3s;z-index:1000}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media print{.nav{position:static}.card{box-shadow:none;border:1px solid #ddd}.deadline{background:#fff;border:1px solid var(--rd)}}
</style>
</head>
<body>
<div class="nav"><a href="./index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l5-5M5 12l5 5"/></svg>Güemes 2026</a><span class="title">Checklist</span><div class="actions"><button onclick="sharePage()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>Compartir</button><button onclick="window.print()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Imprimir</button></div></div>

<div class="deadline">Plazo limite: 4 de mayo de 2026</div>

<div class="main">
<div class="progress-card">
<div class="progress-text"><strong id="count">0</strong> de <strong id="total">13</strong> completados</div>
<div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
</div>

<div class="card">
<h2>A. Documentos administrativos</h2>
<div class="check-item"><input type="checkbox" id="c1" onchange="updateProgress()"><label for="c1"><strong>Solicitud firmada</strong> por el alcalde/presidente <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Formulario oficial firmado y sellado</span></label></div>
<div class="check-item"><input type="checkbox" id="c2" onchange="updateProgress()"><label for="c2"><strong>Certificado Hacienda</strong> (AEAT) <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Estar al corriente de obligaciones tributarias. Tramita: secretario/interventor</span></label></div>
<div class="check-item"><input type="checkbox" id="c3" onchange="updateProgress()"><label for="c3"><strong>Certificado Seguridad Social</strong> <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Estar al corriente. Tramita: secretario/interventor</span></label></div>
<div class="check-item"><input type="checkbox" id="c4" onchange="updateProgress()"><label for="c4"><strong>Certificado Gobierno Cantabria</strong> <span class="tag tag-req">OBLIGATORIO</span><span class="detail">No tener deudas pendientes con la Administracion autonomica</span></label></div>
<div class="check-item"><input type="checkbox" id="c5" onchange="updateProgress()"><label for="c5"><strong>Certificado habitantes</strong> (&lt;1.000 censados) <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Certificado del padron municipal. Güemes: 301 hab.</span></label></div>
<div class="check-item"><input type="checkbox" id="c6" onchange="updateProgress()"><label for="c6"><strong>Acuerdo Junta Vecinal</strong> aprobando la solicitud <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Sesión extraordinaria 13 de abril 2026. Modelo de acta disponible.</span></label></div>
</div>

<div class="card">
<h2>B. Documentos tecnicos</h2>
<div class="check-item"><input type="checkbox" id="c7" onchange="updateProgress()"><label for="c7"><strong>Memoria de Actuacion</strong> <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Documento central. 12 secciones. LISTO.</span></label></div>
<div class="check-item"><input type="checkbox" id="c8" onchange="updateProgress()"><label for="c8"><strong>Memoria Económica / Presupuesto</strong> <span class="tag tag-req">OBLIGATORIO</span><span class="detail">160.000 EUR en 4 bloques. LISTO.</span></label></div>
<div class="check-item"><input type="checkbox" id="c9" onchange="updateProgress()"><label for="c9"><strong>Documentación grafica</strong> <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Fotos estado actual de las 4 zonas, planos, GPX. PENDIENTE fotos.</span></label></div>
<div class="check-item"><input type="checkbox" id="c10" onchange="updateProgress()"><label for="c10"><strong>Cronograma de ejecucion</strong> <span class="tag tag-req">OBLIGATORIO</span><span class="detail">Incluido en la Memoria Económica. LISTO.</span></label></div>
</div>

<div class="card">
<h2>C. Documentación complementaria</h2>
<div class="check-item"><input type="checkbox" id="c11" onchange="updateProgress()"><label for="c11"><strong>Cartas de apoyo</strong> (vecinos, asociaciones, empresas) <span class="tag tag-rec">RECOMENDADO</span><span class="detail">4 modelos disponibles. Recoger firmas antes del 28 abril.</span></label></div>
<div class="check-item"><input type="checkbox" id="c12" onchange="updateProgress()"><label for="c12"><strong>Dossier histórico-cultural</strong> <span class="tag tag-rec">RECOMENDADO</span><span class="detail">11 secciones, 942 años de historia. LISTO.</span></label></div>
<div class="check-item"><input type="checkbox" id="c13" onchange="updateProgress()"><label for="c13"><strong>Itinerario para visita del jurado</strong> <span class="tag tag-rec">RECOMENDADO</span><span class="detail">6 paradas, 2h30. LISTO.</span></label></div>
</div>
</div>

<div class="footer">Checklist Documentación · Junta Vecinal de Güemes · Bareyo · Cantabria</div>
<div class="toast" id="toast"></div>
<script>
function updateProgress(){const boxes=document.querySelectorAll('input[type=checkbox]');let checked=0;boxes.forEach(b=>{if(b.checked)checked++});document.getElementById('count').textContent=checked;document.getElementById('pbar').style.width=(checked/boxes.length*100)+'%';const data={};boxes.forEach(b=>data[b.id]=b.checked);localStorage.setItem('guemes-checklist',JSON.stringify(data))}
function loadProgress(){try{const d=JSON.parse(localStorage.getItem('guemes-checklist'));if(d){Object.keys(d).forEach(k=>{const el=document.getElementById(k);if(el)el.checked=d[k]});updateProgress()}}catch(e){}}
loadProgress();document.getElementById('total').textContent=document.querySelectorAll('input[type=checkbox]').length;
async function sharePage(){const u=window.location.href;if(navigator.share){try{await navigator.share({title:'Güemes 2026 — Checklist',url:u})}catch(e){copyUrl(u)}}else{copyUrl(u)}}
function copyUrl(u){navigator.clipboard.writeText(u).then(()=>showToast('Enlace copiado')).catch(()=>{const t=document.createElement('textarea');t.value=u;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('Enlace copiado')})}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>
</body>
</html>
